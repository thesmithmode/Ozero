name: Throughput Bench

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Длительность iperf3 теста (секунды)'
        required: false
        default: '30'
      api-level:
        description: 'Android API level для эмулятора'
        required: false
        default: '33'

jobs:
  throughput-bench:
    name: Throughput Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download native binaries
        run: ./gradlew :engine-byedpi:downloadBinaries --stacktrace

      - name: Build debug APK + androidTest APK
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --stacktrace

      - name: Install iperf3
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends iperf3

      - name: Start iperf3 server (background)
        run: iperf3 -s -p 5201 -D --logfile /tmp/iperf3-server.log

      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set bench params
        env:
          DURATION_INPUT: ${{ github.event.inputs.duration }}
          API_LEVEL_INPUT: ${{ github.event.inputs.api-level }}
        run: |
          DURATION="${DURATION_INPUT:-30}"
          API_LEVEL="${API_LEVEL_INPUT:-33}"
          echo "BENCH_DURATION=$DURATION" >> "$GITHUB_ENV"
          echo "BENCH_API_LEVEL=$API_LEVEL" >> "$GITHUB_ENV"

      - name: Run throughput bench on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.BENCH_API_LEVEL }}
          arch: x86_64
          profile: Nexus 6
          script: |
            adb wait-for-device
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb install -r app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
            adb shell am instrument \
              -w \
              -e OZERO_BENCH 1 \
              -e class ru.ozero.app.bench.ThroughputBenchTest \
              ru.ozero.app.test/androidx.test.runner.AndroidJUnitRunner \
              | tee /tmp/bench-output.txt
            adb pull /sdcard/throughput-results.json ./throughput-results.json || echo '{}' > throughput-results.json

      - name: Run iperf3 runner script (host-side metrics)
        run: |
          chmod +x tools/iperf3-runner.sh
          bash tools/iperf3-runner.sh "$BENCH_DURATION" host-throughput-results.json || true

      - name: Write job summary
        if: always()
        run: |
          echo "## Throughput Bench Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f throughput-results.json ]; then
            echo "### Device (emulator) metrics" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat throughput-results.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f host-throughput-results.json ]; then
            echo "### Host (iperf3 script) metrics" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat host-throughput-results.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload throughput results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: throughput-results
          path: |
            throughput-results.json
            host-throughput-results.json
          retention-days: 30

      - name: Upload iperf3 server log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iperf3-server-log
          path: /tmp/iperf3-server.log
          retention-days: 7
