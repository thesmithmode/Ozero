name: Build native binaries

on:
  workflow_dispatch:
    inputs:
      artifact:
        description: 'Which artifact to build'
        required: true
        default: 'byedpi'
        type: choice
        options:
          - byedpi
          - xray
  push:
    branches:
      - 'feat/**'
    paths:
      - '.github/workflows/binaries.yml'
      - 'build-tools/Dockerfile'
      - 'build-tools/Dockerfile.byedpi'
      - 'build-tools/build_byedpi.sh'
      - 'build-tools/build_xray.sh'
      - 'build-tools/regen_lock.py'

jobs:
  build:
    name: Build artifact
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      artifact: ${{ env.ARTIFACT }}
    env:
      ARTIFACT: ${{ inputs.artifact || 'byedpi' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute per-engine tag
        id: tag
        run: |
          # Tag scheme: <engine>-<sha8> where sha8 hashes the engine's build
          # inputs (Dockerfile + build script + regen_lock). Per-engine isolation:
          # bumping xray never invalidates the byedpi tag.
          case "$ARTIFACT" in
            byedpi)
              FILES="build-tools/Dockerfile.byedpi build-tools/build_byedpi.sh build-tools/regen_lock.py"
              ;;
            xray)
              FILES="build-tools/Dockerfile build-tools/build_xray.sh build-tools/regen_lock.py"
              ;;
            *)
              echo "Unknown artifact: $ARTIFACT" >&2
              exit 1
              ;;
          esac
          # shellcheck disable=SC2086
          HASH=$(cat $FILES | sha256sum | cut -c1-8)
          TAG="${ARTIFACT}-${HASH}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      # ---------------------------------------------------------------------
      # byedpi build (CMake + NDK only)
      # ---------------------------------------------------------------------
      - name: Clone byedpi (pinned)
        if: env.ARTIFACT == 'byedpi'
        env:
          BYEDPI_VERSION: v0.17.3
        run: |
          git clone --depth 1 --branch "$BYEDPI_VERSION" \
            https://github.com/hufrea/byedpi.git \
            engine-byedpi/src/main/cpp/byedpi

      - name: Build byedpi Docker image
        if: env.ARTIFACT == 'byedpi'
        run: docker build -t ozero-byedpi -f build-tools/Dockerfile.byedpi build-tools/

      - name: Build byedpi (4 ABI)
        if: env.ARTIFACT == 'byedpi'
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            -e REPO_ROOT=/src \
            -e OUT_DIR=/src/out/byedpi \
            ozero-byedpi \
            bash build-tools/build_byedpi.sh

      # ---------------------------------------------------------------------
      # xray build (Go + gomobile bind → AAR)
      # ---------------------------------------------------------------------
      - name: Build xray Docker image
        if: env.ARTIFACT == 'xray'
        run: docker build -t ozero-xray -f build-tools/Dockerfile build-tools/

      - name: Build xray AAR (multi-ABI)
        if: env.ARTIFACT == 'xray'
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            -e REPO_ROOT=/src \
            -e OUTPUT_DIR=/src/out/xray \
            -e ANDROID_TARGETS="android/arm64,android/arm,android/386,android/amd64" \
            ozero-xray \
            bash build-tools/build_xray.sh

      # ---------------------------------------------------------------------
      # Upload — engine-specific glob
      # ---------------------------------------------------------------------
      - name: Upload byedpi assets
        if: env.ARTIFACT == 'byedpi'
        uses: softprops/action-gh-release@v2
        env:
          GH_TAG: ${{ steps.tag.outputs.tag }}
        with:
          tag_name: ${{ env.GH_TAG }}
          name: Native binaries ${{ env.GH_TAG }}
          body: |
            Auto-built native binaries.

            Engine: byedpi
            Commit: ${{ github.sha }}
          files: |
            out/byedpi/libbyedpi-*.so
            out/byedpi/manifest.txt
          fail_on_unmatched_files: true

      - name: Upload xray assets
        if: env.ARTIFACT == 'xray'
        uses: softprops/action-gh-release@v2
        env:
          GH_TAG: ${{ steps.tag.outputs.tag }}
        with:
          tag_name: ${{ env.GH_TAG }}
          name: Native binaries ${{ env.GH_TAG }}
          body: |
            Auto-built native binaries.

            Engine: xray
            Commit: ${{ github.sha }}
          files: |
            out/xray/libxray.aar
            out/xray/manifest.txt
          fail_on_unmatched_files: true

  # Lock-файл обновляется вручную через build-tools/regen_lock.py — workflow
  # его не правит. Причина: dev-flow в проекте — squash merge feature-веток
  # вручную, поэтому auto-PR от бота избыточен и плодил orphan-ветки
  # bot/binaries-lock-* при выключенной permission «Allow GH Actions to
  # create PRs». Инструкция regen — build-tools/README.md → Binary artifact
  # pipeline.
