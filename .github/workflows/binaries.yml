name: Build native binaries

on:
  workflow_dispatch:
    inputs:
      artifact:
        description: 'Which artifact to build'
        required: true
        default: 'byedpi'
        type: choice
        options:
          - byedpi
          - naive
          - amneziawg
          - hysteria2
          - tor
  push:
    branches:
      - 'feat/**'
    paths:
      - '.github/workflows/binaries.yml'
      - 'build-tools/Dockerfile'
      - 'build-tools/Dockerfile.byedpi'
      - 'build-tools/build_byedpi.sh'
      - 'build-tools/build_naive.sh'
      - 'build-tools/build_amneziawg.sh'
      - 'build-tools/build_hysteria2.sh'
      - 'build-tools/build_tor.sh'
      - 'build-tools/regen_lock.py'

jobs:
  build:
    name: Build artifact
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      artifact: ${{ env.ARTIFACT }}
    env:
      ARTIFACT: ${{ inputs.artifact || 'byedpi' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute per-engine tag
        id: tag
        run: |
          # Tag scheme: <engine>-<sha8> where sha8 hashes the engine's build
          # inputs (Dockerfile + build script + regen_lock). Per-engine isolation:
          # bumping xray never invalidates the byedpi tag.
          case "$ARTIFACT" in
            byedpi)
              FILES="build-tools/Dockerfile.byedpi build-tools/build_byedpi.sh build-tools/regen_lock.py"
              ;;
            naive)
              FILES="build-tools/build_naive.sh build-tools/regen_lock.py"
              ;;
            amneziawg)
              FILES="build-tools/Dockerfile build-tools/build_amneziawg.sh build-tools/regen_lock.py"
              ;;
            hysteria2)
              FILES="build-tools/Dockerfile build-tools/build_hysteria2.sh build-tools/regen_lock.py"
              ;;
            tor)
              FILES="build-tools/build_tor.sh build-tools/regen_lock.py"
              ;;
            *)
              echo "Unknown artifact: $ARTIFACT" >&2
              exit 1
              ;;
          esac
          # shellcheck disable=SC2086
          HASH=$(cat $FILES | sha256sum | cut -c1-8)
          TAG="${ARTIFACT}-${HASH}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      # ---------------------------------------------------------------------
      # byedpi build (CMake + NDK only)
      # ---------------------------------------------------------------------
      - name: Clone byedpi (pinned)
        if: env.ARTIFACT == 'byedpi'
        env:
          BYEDPI_VERSION: v0.17.3
        run: |
          git clone --depth 1 --branch "$BYEDPI_VERSION" \
            https://github.com/hufrea/byedpi.git \
            engine-byedpi/src/main/cpp/byedpi

      - name: Build byedpi Docker image
        if: env.ARTIFACT == 'byedpi'
        run: docker build -t ozero-byedpi -f build-tools/Dockerfile.byedpi build-tools/

      - name: Build byedpi (4 ABI)
        if: env.ARTIFACT == 'byedpi'
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            -e REPO_ROOT=/src \
            -e OUT_DIR=/src/out/byedpi \
            ozero-byedpi \
            bash build-tools/build_byedpi.sh

      # ---------------------------------------------------------------------
      # amneziawg build (Go + gomobile bind → AAR, multi-ABI)
      # ---------------------------------------------------------------------
      - name: Build amneziawg Docker image
        if: env.ARTIFACT == 'amneziawg'
        run: docker build -t ozero-xray -f build-tools/Dockerfile build-tools/

      - name: Build amneziawg AAR (multi-ABI)
        if: env.ARTIFACT == 'amneziawg'
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            -e REPO_ROOT=/src \
            -e OUTPUT_DIR=/src/out/amneziawg \
            -e ANDROID_TARGETS="android/arm64,android/arm,android/386,android/amd64" \
            ozero-xray \
            bash build-tools/build_amneziawg.sh

      # ---------------------------------------------------------------------
      # hysteria2 build (Go + gomobile bind → AAR, multi-ABI)
      # ---------------------------------------------------------------------
      - name: Build hysteria2 Docker image
        if: env.ARTIFACT == 'hysteria2'
        run: docker build -t ozero-xray -f build-tools/Dockerfile build-tools/

      - name: Build hysteria2 AAR (multi-ABI)
        if: env.ARTIFACT == 'hysteria2'
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            -e REPO_ROOT=/src \
            -e OUTPUT_DIR=/src/out/hysteria2 \
            -e ANDROID_TARGETS="android/arm64,android/arm,android/386,android/amd64" \
            ozero-xray \
            bash build-tools/build_hysteria2.sh

      # ---------------------------------------------------------------------
      # tor build (download tor-android + IPtProxy AAR из Maven Central,
      # extract jni/<abi>/*.so, 4 ABI)
      # ---------------------------------------------------------------------
      - name: Build tor + IPtProxy (extract from Maven Central AAR)
        if: env.ARTIFACT == 'tor'
        run: |
          REPO_ROOT="$PWD" \
          OUT_DIR="$PWD/out/tor" \
          bash build-tools/build_tor.sh

      # ---------------------------------------------------------------------
      # naive build (распаковка libnaive.so из upstream APK plugin, 4 ABI)
      # ---------------------------------------------------------------------
      - name: Build naive (extract from APK plugin)
        if: env.ARTIFACT == 'naive'
        run: |
          REPO_ROOT="$PWD" \
          OUT_DIR="$PWD/out/naive" \
          bash build-tools/build_naive.sh

      # ---------------------------------------------------------------------
      # Upload — engine-specific glob
      # ---------------------------------------------------------------------
      - name: Upload byedpi assets
        if: env.ARTIFACT == 'byedpi' && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        env:
          GH_TAG: ${{ steps.tag.outputs.tag }}
        with:
          tag_name: ${{ env.GH_TAG }}
          name: Native binaries ${{ env.GH_TAG }}
          body: |
            Auto-built native binaries.

            Engine: byedpi
            Commit: ${{ github.sha }}
          files: |
            out/byedpi/libbyedpi-*.so
            out/byedpi/manifest.txt
          fail_on_unmatched_files: true
          prerelease: true

      - name: Upload naive assets
        if: env.ARTIFACT == 'naive' && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        env:
          GH_TAG: ${{ steps.tag.outputs.tag }}
        with:
          tag_name: ${{ env.GH_TAG }}
          name: Native binaries ${{ env.GH_TAG }}
          body: |
            Auto-built native binaries.

            Engine: naive
            Commit: ${{ github.sha }}
          files: |
            out/naive/libnaive-*.so
            out/naive/manifest.txt
          fail_on_unmatched_files: true
          prerelease: true

      - name: Upload amneziawg assets
        if: env.ARTIFACT == 'amneziawg' && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        env:
          GH_TAG: ${{ steps.tag.outputs.tag }}
        with:
          tag_name: ${{ env.GH_TAG }}
          name: Native binaries ${{ env.GH_TAG }}
          body: |
            Auto-built native binaries.

            Engine: amneziawg
            Commit: ${{ github.sha }}
          files: |
            out/amneziawg/libamneziawg.aar
            out/amneziawg/manifest.txt
          fail_on_unmatched_files: true
          prerelease: true

      - name: Upload hysteria2 assets
        if: env.ARTIFACT == 'hysteria2' && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        env:
          GH_TAG: ${{ steps.tag.outputs.tag }}
        with:
          tag_name: ${{ env.GH_TAG }}
          name: Native binaries ${{ env.GH_TAG }}
          body: |
            Auto-built native binaries.

            Engine: hysteria2
            Commit: ${{ github.sha }}
          files: |
            out/hysteria2/libhysteria2.aar
            out/hysteria2/manifest.txt
          fail_on_unmatched_files: true
          prerelease: true

      - name: Upload tor assets
        if: env.ARTIFACT == 'tor' && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        env:
          GH_TAG: ${{ steps.tag.outputs.tag }}
        with:
          tag_name: ${{ env.GH_TAG }}
          name: Native binaries ${{ env.GH_TAG }}
          body: |
            Auto-built native binaries.

            Engine: tor (tor + IPtProxy bundled, два logical engine один tag)
            Source: tor-android Maven Central + IPtProxy Maven Central
            Commit: ${{ github.sha }}
          files: |
            out/tor/libtor-*.so
            out/tor/libiptproxy-*.so
            out/tor/manifest-tor.txt
            out/tor/manifest-iptproxy.txt
          fail_on_unmatched_files: true
          prerelease: true

      # ---------------------------------------------------------------------
      # Auto-cleanup: оставляем последние 3 prerelease на движок, старее
      # удаляем (вместе с git tag). Защита от захламления Releases UI.
      # ---------------------------------------------------------------------
      - name: Cleanup old prereleases for this engine
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENGINE_NAME: ${{ env.ARTIFACT }}
        run: |
          set -euo pipefail
          gh release list --limit 100 --json tagName,isPrerelease,createdAt \
            -R "${{ github.repository }}" \
            | jq -r --arg e "$ENGINE_NAME" '
                [.[] | select(.tagName | startswith($e + "-")) | select(.isPrerelease)]
                | sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | while read -r old; do
                [ -z "$old" ] && continue
                echo "Deleting old prerelease: $old"
                gh release delete "$old" --yes --cleanup-tag -R "${{ github.repository }}" || true
              done

  # Lock-файл обновляется вручную через build-tools/regen_lock.py — workflow
  # его не правит. Причина: dev-flow в проекте — squash merge feature-веток
  # вручную, поэтому auto-PR от бота избыточен и плодил orphan-ветки
  # bot/binaries-lock-* при выключенной permission «Allow GH Actions to
  # create PRs». Инструкция regen — build-tools/README.md → Binary artifact
  # pipeline.
