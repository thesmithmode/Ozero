name: Build URnetwork AAR

# Ручной запуск или по пушу изменений в build script.
# AAR публикуется как Release Asset с тегом urnetwork-<sha8>.
# Основной CI скачивает AAR через actions/download-artifact или из Release Assets.
#
# СТАТУС: EXPERIMENTAL — требует Go 1.25+ с GOEXPERIMENT=greenteagc.
# Upstream urnetwork/sdk имеет нестандартные зависимости (urnetwork/connect,
# urnetwork/glog) которые могут потребовать дополнительной настройки.
# См. engine-urnetwork/README.md §Blockers.

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 'urnetwork/sdk branch/tag'
        required: false
        default: 'main'
  push:
    branches:
      - 'feat/**'
    paths:
      - 'tools/build-urnetwork-aar.sh'
      - '.github/workflows/urnetwork-aar.yml'

jobs:
  build-aar:
    name: Build URnetworkSdk.aar
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout Ozero
        uses: actions/checkout@v4

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        run: |
          export GOEXPERIMENT=greenteagc
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build URnetworkSdk.aar
        env:
          SDK_VERSION: ${{ inputs.sdk_version || 'main' }}
          RUNNER_TEMP: ${{ runner.temp }}/urnetwork-build
          OUTPUT_DIR: ${{ github.workspace }}/engine-urnetwork/libs
          ANDROID_API: '24'
          ANDROID_TARGETS: 'android/arm64,android/arm,android/amd64'
          JAVA_PKG: 'com.bringyour'
          GOEXPERIMENT: greenteagc
          GODEBUG: gotypesalias=0
        run: |
          bash tools/build-urnetwork-aar.sh

      - name: Compute tag
        id: tag
        run: |
          HASH=$(cat tools/build-urnetwork-aar.sh .github/workflows/urnetwork-aar.yml | sha256sum | cut -c1-8)
          TAG="urnetwork-${HASH}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG}"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: urnetwork-aar
          path: |
            engine-urnetwork/libs/URnetworkSdk.aar
            engine-urnetwork/libs/URnetworkSdk.aar.sha256
            engine-urnetwork/libs/manifest.txt
          retention-days: 30

      - name: Publish Release Asset
        uses: softprops/action-gh-release@v2
        env:
          GH_TAG: ${{ steps.tag.outputs.tag }}
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: URnetwork AAR ${{ steps.tag.outputs.tag }}
          body: |
            Auto-built URnetworkSdk.aar

            Commit: ${{ github.sha }}
          files: |
            engine-urnetwork/libs/URnetworkSdk.aar
            engine-urnetwork/libs/URnetworkSdk.aar.sha256
            engine-urnetwork/libs/manifest.txt
          prerelease: true
          fail_on_unmatched_files: true
