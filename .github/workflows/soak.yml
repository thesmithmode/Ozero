name: Soak Test

on:
  workflow_dispatch:
    inputs:
      requests:
        description: 'Количество HTTP запросов (100 = ~10 мин, 600 = ~1ч)'
        required: false
        default: '100'
      api-level:
        description: 'Android API level эмулятора'
        required: false
        default: '33'

jobs:
  soak:
    name: Soak Test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download native binaries
        run: ./gradlew :engine-byedpi:downloadBinaries --stacktrace

      - name: Build debug APK + androidTest APK
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --stacktrace

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set soak params from inputs
        env:
          REQUESTS_INPUT: ${{ github.event.inputs.requests }}
          API_LEVEL_INPUT: ${{ github.event.inputs.api-level }}
        run: |
          echo "SOAK_REQUESTS=${REQUESTS_INPUT:-100}" >> "$GITHUB_ENV"
          echo "SOAK_API_LEVEL=${API_LEVEL_INPUT:-33}" >> "$GITHUB_ENV"

      - name: Run soak on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.SOAK_API_LEVEL }}
          arch: x86_64
          profile: Nexus 6
          script: |
            adb wait-for-device
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb install -r app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
            adb shell am instrument \
              -w \
              -e OZERO_SOAK 1 \
              -e OZERO_SOAK_REQUESTS "$SOAK_REQUESTS" \
              -e class ru.ozero.app.soak.SoakTest \
              ru.ozero.app.test/androidx.test.runner.AndroidJUnitRunner \
              | tee /tmp/soak-output.txt
            adb pull /sdcard/soak-metrics.json ./soak-metrics.json || echo '{}' > soak-metrics.json

      - name: Write job summary
        if: always()
        run: |
          echo "## Soak Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f soak-metrics.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat soak-metrics.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "soak-metrics.json не найден" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload soak metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: soak-metrics
          path: soak-metrics.json
          retention-days: 30

      - name: Upload logcat
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: soak-logcat
          path: /tmp/soak-output.txt
          retention-days: 7
