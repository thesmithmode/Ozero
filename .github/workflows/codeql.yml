name: CodeQL Security Scan

on:
  schedule:
    - cron: '17 3 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analysis (Java)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'java'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Download ByeDPI native binaries
        run: ./gradlew :engine-byedpi:downloadBinaries --stacktrace

      - name: Download URnetwork AAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          URNETWORK_SDK_TAG: urnetwork-sdk-b35b0ec5
          URNETWORK_SDK_SHA256: f3f28bcbe36e9c9cf82793e440ce1fd0abf59196af0d8408df0153449bd33f2f
        run: |
          set -euo pipefail
          mkdir -p engine-urnetwork/libs
          rm -f engine-urnetwork/libs/*.aar engine-urnetwork/libs/*.jar engine-urnetwork/libs/*.sha256
          gh release download "$URNETWORK_SDK_TAG" -p "URnetworkSdk.aar" -D engine-urnetwork/libs --clobber
          gh release download "$URNETWORK_SDK_TAG" -p "URnetworkSdk.aar.sha256" -D engine-urnetwork/libs --clobber
          PUBLISHED_SHA256=$(awk '{print $1}' engine-urnetwork/libs/URnetworkSdk.aar.sha256)
          if [ "$PUBLISHED_SHA256" != "$URNETWORK_SDK_SHA256" ]; then
            echo "::error::URnetworkSdk.aar.sha256 does not match pinned digest"
            exit 1
          fi
          printf '%s  %s\n' "$URNETWORK_SDK_SHA256" engine-urnetwork/libs/URnetworkSdk.aar | sha256sum -c -
          find engine-urnetwork/libs -maxdepth 1 -type f \( -name '*.aar' -o -name '*.jar' \) ! -name 'URnetworkSdk.aar' -print -quit | grep -q . && {
            echo "::error::unexpected URnetwork classpath artifact"
            exit 1
          }
          aar=engine-urnetwork/libs/URnetworkSdk.aar
          tmpdir=$(mktemp -d)
          unzip -o "$aar" -d "$tmpdir/aar-exploded"
          zip -d "$tmpdir/aar-exploded/classes.jar" 'go/*.class' 2>/dev/null || true
          (cd "$tmpdir/aar-exploded" && zip -r9 "$GITHUB_WORKSPACE/$aar" .)
          rm -rf "$tmpdir"

      - name: Download and explode Singbox AAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TMPAAR=/tmp/libbox.aar
          gh release download singbox-1.13.12 -p "libbox.aar" -D /tmp --clobber
          mkdir -p singbox-core/libs singbox-core/libs-stubs /tmp/go-stubs
          unzip -o "$TMPAAR" classes.jar -d /tmp
          cp /tmp/classes.jar singbox-core/libs/libbox.jar
          unzip -o /tmp/classes.jar 'go/*.class' -d /tmp/go-stubs 2>/dev/null || true
          jar cf singbox-core/libs-stubs/go-stubs.jar -C /tmp/go-stubs . 2>/dev/null || true
          python3 scripts/patch-go-seq.py singbox-core/libs-stubs/go-stubs.jar
          zip -d singbox-core/libs/libbox.jar 'go/*.class' || true
          mkdir -p singbox-core/src/main/jniLibs
          unzip -o "$TMPAAR" 'jni/*' -d /tmp/aar-exploded || true
          if [ -d /tmp/aar-exploded/jni ]; then
            cp -r /tmp/aar-exploded/jni/* singbox-core/src/main/jniLibs/
          fi

      - name: Build for CodeQL analysis
        run: ./gradlew assembleDebug --no-daemon

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
