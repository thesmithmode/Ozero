name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

jobs:
  release:
    name: Build, sign, publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Cache libhev-socks5-tunnel.so jniLibs
        id: libhev-cache
        uses: actions/cache@v4
        with:
          path: |
            common-vpn/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so
            common-vpn/src/main/jniLibs/armeabi-v7a/libhev-socks5-tunnel.so
            common-vpn/src/main/jniLibs/x86_64/libhev-socks5-tunnel.so
          key: libhev-2.7.0-ndk-r27c-platform-android-24-pkgname-hev-16kb-v4

      - name: Setup Android NDK
        id: ndk
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Clone hev-socks5-tunnel (pinned)
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        env:
          HEV_VERSION: '2.7.0'
        run: |
          git clone --depth 1 --recursive --branch "$HEV_VERSION" \
            https://github.com/heiher/hev-socks5-tunnel.git \
            "$RUNNER_TEMP/hev-socks5-tunnel"

      - name: Build libhev-socks5-tunnel.so (3 ABI via ndk-build)
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        env:
          NDK_PATH: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          SRC="$RUNNER_TEMP/hev-socks5-tunnel"
          OUT="common-vpn/src/main/jniLibs"
          mkdir -p "$OUT/arm64-v8a" "$OUT/armeabi-v7a" "$OUT/x86_64"

          cd "$SRC"
          "$NDK_PATH/ndk-build" \
            NDK_PROJECT_PATH="$SRC" \
            APP_BUILD_SCRIPT="$SRC/Android.mk" \
            NDK_APPLICATION_MK="$SRC/Application.mk" \
            APP_ABI="arm64-v8a armeabi-v7a x86_64" \
            APP_PLATFORM=android-24 \
            APP_CFLAGS="-DPKGNAME=hev" \
            APP_LDFLAGS="-Wl,-z,max-page-size=16384,-z,common-page-size=16384" \
            -j"$(nproc)"

          STRIP="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            SO_SRC="$SRC/libs/$ABI/libhev-socks5-tunnel.so"
            if [ ! -f "$SO_SRC" ]; then
              echo "::error::libhev-socks5-tunnel.so не найден для $ABI"
              find "$SRC/libs" -name '*.so' || true
              exit 1
            fi
            cp "$SO_SRC" "$GITHUB_WORKSPACE/$OUT/$ABI/libhev-socks5-tunnel.so"
            "$STRIP" "$GITHUB_WORKSPACE/$OUT/$ABI/libhev-socks5-tunnel.so" || true
          done
          cd "$GITHUB_WORKSPACE"
          echo "Built jniLibs:"
          ls -la "$OUT"/*/libhev-socks5-tunnel.so

      - name: Assert JNI symbols в libhev-socks5-tunnel.so
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        env:
          NDK_PATH: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          NM="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm"
          REQUIRED='JNI_OnLoad'
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            SO="common-vpn/src/main/jniLibs/$ABI/libhev-socks5-tunnel.so"
            if [ ! -f "$SO" ]; then continue; fi
            SYMS=$("$NM" -D --defined-only "$SO" || true)
            for sym in $REQUIRED; do
              if ! echo "$SYMS" | grep -q "$sym"; then
                echo "::error::В $SO отсутствует JNI-symbol $sym"
                exit 1
              fi
            done
          done
          echo "JNI symbols OK на всех ABI"

      - name: Assert PKGNAME=hev зашит в libhev-socks5-tunnel.so
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            SO="common-vpn/src/main/jniLibs/$ABI/libhev-socks5-tunnel.so"
            if [ ! -f "$SO" ]; then continue; fi
            if ! strings "$SO" | grep -qx 'hev/TProxyService'; then
              echo "::error::В $SO нет literal 'hev/TProxyService' — PKGNAME не передан в ndk-build, JNI_OnLoad упадёт с ART JniAbort"
              echo "Найденные TProxyService-related strings:"
              strings "$SO" | grep -i 'tproxy\|hev/' || true
              exit 1
            fi
          done
          echo "PKGNAME=hev зашит корректно — FindClass найдёт hev/TProxyService"

      - name: Assert 16KB page-size alignment в arm64/x86_64 libhev
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        env:
          NDK_PATH: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          READELF="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          REQUIRED_ALIGN=16384
          for ABI in arm64-v8a x86_64; do
            SO="common-vpn/src/main/jniLibs/$ABI/libhev-socks5-tunnel.so"
            if [ ! -f "$SO" ]; then continue; fi
            ALIGN_HEX=$("$READELF" -lW "$SO" | awk '/^\s*LOAD/ {print $NF; exit}')
            ALIGN_DEC=$(printf '%d' "$ALIGN_HEX")
            if [ "$ALIGN_DEC" -lt "$REQUIRED_ALIGN" ]; then
              echo "::error::$SO имеет LOAD-segment alignment=$ALIGN_HEX (<$REQUIRED_ALIGN) — Android 15+ Pixel 9 (16KB pages) откажется грузить, dlopen UnsatisfiedLinkError"
              exit 1
            fi
            echo "$ABI: LOAD alignment=$ALIGN_HEX (>=0x4000) — Android 15 16KB compatible"
          done

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Secret RELEASE_KEYSTORE_BASE64 is empty"
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "OZERO_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          OZERO_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          OZERO_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          OZERO_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          UPDATE_PUBLIC_KEY_HEX: ${{ secrets.UPDATE_PUBLIC_KEY_HEX }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Assert APK содержит libhev-socks5-tunnel.so для всех ABI
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::Release APK не собран"
            exit 1
          fi
          echo "Проверяю $APK"
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            if ! unzip -l "$APK" | grep -q "lib/$ABI/libhev-socks5-tunnel.so"; then
              echo "::error::В APK отсутствует lib/$ABI/libhev-socks5-tunnel.so — VPN краш гарантирован"
              unzip -l "$APK" | grep -E "lib/[^/]+/" | head -30
              exit 1
            fi
            SIZE=$(unzip -l "$APK" "lib/$ABI/libhev-socks5-tunnel.so" | awk 'NR==4{print $1}')
            if [ "$SIZE" -lt 50000 ]; then
              echo "::error::libhev-socks5-tunnel.so для $ABI подозрительно мал ($SIZE байт)"
              exit 1
            fi
          done
          echo "APK содержит libhev на всех нужных ABI"

      - name: Assert APK содержит libbyedpi.so без abi-суффикса для всех ABI
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            if ! unzip -l "$APK" | grep -q "lib/$ABI/libbyedpi.so"; then
              echo "::error::В APK отсутствует lib/$ABI/libbyedpi.so"
              unzip -l "$APK" | grep -E "lib/$ABI/" || true
              exit 1
            fi
            SIZE=$(unzip -l "$APK" "lib/$ABI/libbyedpi.so" | awk 'NR==4{print $1}')
            if [ "$SIZE" -lt 50000 ]; then
              echo "::error::libbyedpi.so для $ABI подозрительно мал ($SIZE байт)"
              exit 1
            fi
          done
          echo "APK содержит libbyedpi.so на всех нужных ABI"

      - name: Assert dex содержит hev/TProxyService и native bridge классы
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          WORK="$RUNNER_TEMP/apk-extract"
          rm -rf "$WORK" && mkdir -p "$WORK"
          unzip -q "$APK" "classes*.dex" -d "$WORK"
          REQUIRED_CLASSES=(
            "Lhev/TProxyService;"
            "Lru/ozero/enginebyedpi/ByeDpiProxy;"
            "Lru/ozero/commonvpn/OzeroVpnService;"
            "Lru/ozero/commonvpn/HevTunnelGateway;"
            "Lru/ozero/commonvpn/split/TunBuilderConfigurator;"
            "Lru/ozero/coreapi/PersistentLoggers;"
            "Lru/ozero/coreapi/PersistentLogger;"
            "Lru/ozero/app/logging/BootFileLogger;"
            "Lru/ozero/app/logging/UnifiedLogger;"
            "Lru/ozero/app/logging/BootDiagnostics;"
            "Lru/ozero/app/OzeroApp;"
            "Lru/ozero/app/Hilt_OzeroApp;"
            "Lru/ozero/app/MainActivity;"
          )
          for cls in "${REQUIRED_CLASSES[@]}"; do
            if ! grep -aor "$cls" "$WORK"/classes*.dex | head -n1 | grep -q "$cls"; then
              echo "::error::В classes.dex отсутствует $cls — R8 удалил/переупаковал, native abort гарантирован"
              exit 1
            fi
          done
          FORBIDDEN_CLASSES=(
            "Lru/ozero/enginexray/"
            "Lru/ozero/enginetor/"
            "Lru/ozero/engineamnezia/"
            "Lru/ozero/enginehysteria2/"
            "Lru/ozero/enginenaive/"
            "Lru/ozero/engineurnetwork/"
            "StubLib"
          )
          for cls in "${FORBIDDEN_CLASSES[@]}"; do
            if grep -aor "$cls" "$WORK"/classes*.dex | head -n1 | grep -q "$cls"; then
              echo "::error::В classes.dex обнаружен $cls — engine-* модули должны быть удалены в Phase 0"
              exit 1
            fi
          done
          echo "Native bridge классы сохранены R8, удалённые engine-* отсутствуют"

      - name: Collect artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-out
          shopt -s nullglob
          mapfile -t apks < <(find app/build/outputs/apk/release -name '*.apk' | sort)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "::error::No release APK produced"
            exit 1
          fi
          for apk in "${apks[@]}"; do
            base="$(basename "$apk" .apk)"
            cp "$apk" "release-out/${base}-${TAG}.apk"
          done
          cd release-out
          for apk in *.apk; do
            sha256sum "$apk" > "${apk}.sha256"
          done

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::RELEASE_GPG_PRIVATE_KEY not set — skipping GPG signature"
            echo "GPG_AVAILABLE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --yes --import
          echo "GPG_AVAILABLE=true" >> "$GITHUB_ENV"

      - name: GPG-sign APKs
        if: env.GPG_AVAILABLE == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          cd release-out
          for apk in *.apk; do
            printf '%s\n' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
                --passphrase-fd 0 \
                --detach-sign --armor \
                --output "${apk}.asc" \
                "$apk"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-out/*.apk
            release-out/*.sha256
            release-out/*.asc
