name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Permissions на job-уровне — не глобально, чтобы не давать write-токен всем шагам.
permissions: {}

jobs:
  release:
    name: Build, sign, publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Secret RELEASE_KEYSTORE_BASE64 is empty"
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "OZERO_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Verify lint, tests, coverage
        env:
          OZERO_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          OZERO_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          OZERO_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew ktlintCheck detekt lint testDebugUnitTest jacocoTestReport jacocoTestCoverageVerification --stacktrace

      - name: Build signed release APK
        env:
          OZERO_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          OZERO_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          OZERO_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Collect artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-out
          shopt -s nullglob
          mapfile -t apks < <(find app/build/outputs/apk/release -name '*.apk' | sort)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "::error::No release APK produced"
            exit 1
          fi
          for apk in "${apks[@]}"; do
            base="$(basename "$apk" .apk)"
            cp "$apk" "release-out/${base}-${TAG}.apk"
          done
          cd release-out
          for apk in *.apk; do
            sha256sum "$apk" > "${apk}.sha256"
          done

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::RELEASE_GPG_PRIVATE_KEY not set — skipping GPG signature"
            echo "GPG_AVAILABLE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --yes --import
          echo "GPG_AVAILABLE=true" >> "$GITHUB_ENV"

      - name: GPG-sign APKs
        if: env.GPG_AVAILABLE == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          cd release-out
          for apk in *.apk; do
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --detach-sign --armor \
                --output "${apk}.asc" \
                "$apk"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-out/*.apk
            release-out/*.sha256
            release-out/*.asc
