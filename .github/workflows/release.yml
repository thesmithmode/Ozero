name: Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: ver
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            LAST=$(git tag -l 'v*.*.*' | sort -V | tail -1)
            if [ -z "$LAST" ]; then LAST="v0.0.0"; fi
            IFS='.' read -r ma mi pa <<< "${LAST#v}"
            echo "tag=v${ma}.${mi}.$((pa + 1))" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved release tag: $(grep tag $GITHUB_OUTPUT | cut -d= -f2)"

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Cache libhev-ozero-socks5-tunnel.so jniLibs
        id: libhev-cache
        uses: actions/cache@v5
        with:
          path: common-vpn/src/main/jniLibs/arm64-v8a/libhev-ozero-socks5-tunnel.so
          key: libhev-ozero-2.7.0-ndk-r27c-platform-android-24-pkgname-hev-16kb-arm64-v1

      - name: Setup Android NDK
        id: ndk
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Clone hev-socks5-tunnel (pinned)
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        env:
          HEV_VERSION: '2.7.0'
        run: |
          git clone --depth 1 --recursive --branch "$HEV_VERSION" \
            https://github.com/heiher/hev-socks5-tunnel.git \
            "$RUNNER_TEMP/hev-socks5-tunnel"

      - name: Build libhev-ozero-socks5-tunnel.so (arm64-v8a via ndk-build)
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        env:
          NDK_PATH: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          SRC="$RUNNER_TEMP/hev-socks5-tunnel"
          OUT="common-vpn/src/main/jniLibs"
          mkdir -p "$OUT/arm64-v8a"

          cd "$SRC"
          "$NDK_PATH/ndk-build" \
            NDK_PROJECT_PATH="$SRC" \
            APP_BUILD_SCRIPT="$SRC/Android.mk" \
            NDK_APPLICATION_MK="$SRC/Application.mk" \
            APP_ABI="arm64-v8a" \
            APP_PLATFORM=android-24 \
            APP_CFLAGS="-DPKGNAME=hev" \
            APP_LDFLAGS="-Wl,-z,max-page-size=16384,-z,common-page-size=16384" \
            -j"$(nproc)"

          STRIP="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          SO_SRC="$SRC/libs/arm64-v8a/libhev-socks5-tunnel.so"
          if [ ! -f "$SO_SRC" ]; then
            echo "::error::libhev-socks5-tunnel.so не найден для arm64-v8a"
            find "$SRC/libs" -name '*.so' || true
            exit 1
          fi
          cp "$SO_SRC" "$GITHUB_WORKSPACE/$OUT/arm64-v8a/libhev-ozero-socks5-tunnel.so"
          "$STRIP" "$GITHUB_WORKSPACE/$OUT/arm64-v8a/libhev-ozero-socks5-tunnel.so" || true
          cd "$GITHUB_WORKSPACE"
          echo "Built jniLibs:"
          ls -la "$OUT/arm64-v8a/libhev-ozero-socks5-tunnel.so"

      - name: Assert JNI symbols в libhev-ozero-socks5-tunnel.so
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        env:
          NDK_PATH: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          NM="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm"
          SO="common-vpn/src/main/jniLibs/arm64-v8a/libhev-ozero-socks5-tunnel.so"
          SYMS=$("$NM" -D --defined-only "$SO" || true)
          if ! echo "$SYMS" | grep -q 'JNI_OnLoad'; then
            echo "::error::В $SO отсутствует JNI_OnLoad"
            exit 1
          fi
          echo "JNI symbols OK (arm64-v8a)"

      - name: Assert PKGNAME=hev зашит в libhev-ozero-socks5-tunnel.so
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          SO="common-vpn/src/main/jniLibs/arm64-v8a/libhev-ozero-socks5-tunnel.so"
          if ! strings "$SO" | grep -qx 'hev/TProxyService'; then
            echo "::error::В $SO нет literal 'hev/TProxyService' — PKGNAME не передан в ndk-build, JNI_OnLoad упадёт с ART JniAbort"
            strings "$SO" | grep -i 'tproxy\|hev/' || true
            exit 1
          fi
          echo "PKGNAME=hev зашит корректно"

      - name: Assert 16KB page-size alignment в arm64-v8a libhev
        if: steps.libhev-cache.outputs.cache-hit != 'true'
        env:
          NDK_PATH: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -euo pipefail
          READELF="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          SO="common-vpn/src/main/jniLibs/arm64-v8a/libhev-ozero-socks5-tunnel.so"
          ALIGN_HEX=$("$READELF" -lW "$SO" | awk '/^\s*LOAD/ {print $NF; exit}')
          ALIGN_DEC=$(printf '%d' "$ALIGN_HEX")
          if [ "$ALIGN_DEC" -lt 16384 ]; then
            echo "::error::$SO LOAD alignment=$ALIGN_HEX (<0x4000) — Android 15 16KB pages откажется грузить"
            exit 1
          fi
          echo "arm64-v8a: LOAD alignment=$ALIGN_HEX — Android 15 16KB compatible"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Secret RELEASE_KEYSTORE_BASE64 is empty"
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "OZERO_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Download URnetwork AAR (urnetwork-sdk only — Portal Tor parity)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p engine-urnetwork/libs
          TAG=$(gh release list --limit 100 --json tagName \
            | grep -oE '"urnetwork-sdk-[a-f0-9]{8}"' \
            | head -n1 | tr -d '"')
          if [ -z "$TAG" ]; then
            echo "::error::no urnetwork-sdk release found"
            exit 1
          fi
          gh release download "$TAG" -p "*" -D engine-urnetwork/libs --clobber
          for aar in engine-urnetwork/libs/*.aar; do
            [ -f "$aar" ] || continue
            tmpdir=$(mktemp -d)
            unzip -o "$aar" -d "$tmpdir/aar-exploded"
            zip -d "$tmpdir/aar-exploded/classes.jar" 'go/*.class' 2>/dev/null || true
            (cd "$tmpdir/aar-exploded" && zip -r9 "$GITHUB_WORKSPACE/$aar" .)
            rm -rf "$tmpdir"
          done

      - name: Download and explode Singbox AAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TMPAAR=/tmp/libbox.aar
          gh release download singbox-1.13.12 -p "libbox.aar" -D /tmp --clobber
          mkdir -p singbox-core/libs singbox-core/libs-stubs /tmp/go-stubs
          unzip -o "$TMPAAR" classes.jar -d /tmp
          cp /tmp/classes.jar singbox-core/libs/libbox.jar
          unzip -o /tmp/classes.jar 'go/*.class' -d /tmp/go-stubs 2>/dev/null || true
          jar cf singbox-core/libs-stubs/go-stubs.jar -C /tmp/go-stubs . 2>/dev/null || true
          python3 scripts/patch-go-seq.py singbox-core/libs-stubs/go-stubs.jar
          zip -d singbox-core/libs/libbox.jar 'go/*.class' || true
          mkdir -p singbox-core/src/main/jniLibs
          unzip -o "$TMPAAR" 'jni/*' -d /tmp/aar-exploded || true
          if [ -d /tmp/aar-exploded/jni ]; then
            cp -r /tmp/aar-exploded/jni/* singbox-core/src/main/jniLibs/
          fi
          ls -la singbox-core/libs/
          find singbox-core/src/main/jniLibs -type f 2>/dev/null || echo "no jniLibs"

      - name: Download FPTN native lib
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DST="engine-fptn/src/main/jniLibs/arm64-v8a/libfptn_native_lib.so"
          if [ -f "$DST" ] && [ "$(stat -c%s "$DST")" -gt 1000 ]; then
            echo "libfptn_native_lib.so already in repo — skipping download"
            exit 0
          fi
          TAG=$(gh release list --limit 100 --json tagName \
            | grep -oE '"fptn-[a-f0-9]{8}"' \
            | head -n1 | tr -d '"')
          if [ -z "$TAG" ]; then
            echo "::error::no fptn release found — run binaries.yml with artifact=fptn first"
            exit 1
          fi
          mkdir -p "$(dirname "$DST")"
          gh release download "$TAG" -p "libfptn_native_lib-arm64-v8a.so" \
            -D /tmp/fptn-dl --clobber
          cp /tmp/fptn-dl/libfptn_native_lib-arm64-v8a.so "$DST"
          echo "Downloaded $DST from $TAG"

      - name: Build signed release APK
        env:
          OZERO_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          OZERO_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          OZERO_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          UPDATE_PUBLIC_KEY_HEX: ${{ secrets.UPDATE_PUBLIC_KEY_HEX }}
          OZERO_VERSION_NAME: ${{ steps.ver.outputs.tag }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Assert APK versionCode matches gradle.properties
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          ANDROID_HOME="${ANDROID_HOME:-${ANDROID_SDK_ROOT}}"
          AAPT=$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort | tail -1)
          if [ -z "$AAPT" ]; then
            echo "::error::aapt not found in build-tools"
            exit 1
          fi
          VC=$("$AAPT" dump badging "$APK" | grep -oE "versionCode='[0-9]+'" | head -n1 | grep -oE "[0-9]+")
          VC_EXPECTED=$(grep '^VERSION_CODE=' gradle.properties | cut -d= -f2)
          if [ -z "$VC" ] || [ "$VC" != "$VC_EXPECTED" ]; then
            echo "::error::APK versionCode=$VC ≠ VERSION_CODE=$VC_EXPECTED в gradle.properties"
            exit 1
          fi
          if [ "$VC" -lt 2211 ]; then
            echo "::error::APK versionCode=$VC < floor 2211 (v0.2.1 baseline)"
            exit 1
          fi
          echo "APK versionCode=$VC OK"

      - name: Assert APK содержит libhev-ozero-socks5-tunnel.so (arm64-v8a)
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::Release APK не собран"
            exit 1
          fi
          if ! unzip -l "$APK" | grep -q "lib/arm64-v8a/libhev-ozero-socks5-tunnel.so"; then
            echo "::error::В APK отсутствует lib/arm64-v8a/libhev-ozero-socks5-tunnel.so"
            unzip -l "$APK" | grep -E "lib/[^/]+/" | head -30
            exit 1
          fi
          SIZE=$(unzip -l "$APK" "lib/arm64-v8a/libhev-ozero-socks5-tunnel.so" | awk 'NR==4{print $1}')
          if [ "$SIZE" -lt 50000 ]; then
            echo "::error::libhev-ozero-socks5-tunnel.so подозрительно мал ($SIZE байт)"
            exit 1
          fi
          echo "APK содержит libhev (arm64-v8a)"

      - name: Assert APK содержит libbyedpi.so (arm64-v8a)
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          if ! unzip -l "$APK" | grep -q "lib/arm64-v8a/libbyedpi.so"; then
            echo "::error::В APK отсутствует lib/arm64-v8a/libbyedpi.so"
            unzip -l "$APK" | grep -E "lib/arm64-v8a/" || true
            exit 1
          fi
          SIZE=$(unzip -l "$APK" "lib/arm64-v8a/libbyedpi.so" | awk 'NR==4{print $1}')
          if [ "$SIZE" -lt 50000 ]; then
            echo "::error::libbyedpi.so подозрительно мал ($SIZE байт)"
            exit 1
          fi
          echo "APK содержит libbyedpi.so (arm64-v8a)"

      - name: Assert APK содержит libfptn_native_lib.so (arm64-v8a)
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          if ! unzip -l "$APK" | grep -q "lib/arm64-v8a/libfptn_native_lib.so"; then
            echo "::error::В APK отсутствует lib/arm64-v8a/libfptn_native_lib.so"
            unzip -l "$APK" | grep -E "lib/arm64-v8a/" || true
            exit 1
          fi
          SIZE=$(unzip -l "$APK" "lib/arm64-v8a/libfptn_native_lib.so" | awk 'NR==4{print $1}')
          if [ "$SIZE" -lt 50000 ]; then
            echo "::error::libfptn_native_lib.so подозрительно мал ($SIZE байт)"
            exit 1
          fi
          echo "APK содержит libfptn_native_lib.so (arm64-v8a)"

      - name: Assert WARP libam-go.so SHA256 == PORTAL_WG_v1.4.3 reference
        run: |
          set -euo pipefail
          SO_SRC="engine-warp/src/main/jniLibs/arm64-v8a/libam-go.so"
          EXPECTED="2ebc0ee96c0a0f0edbdf4687f2981888184b63d417417343b2774f5355daa603"
          if [ ! -f "$SO_SRC" ]; then
            echo "::error::checked-in $SO_SRC не найден"
            exit 1
          fi
          ACTUAL=$(sha256sum "$SO_SRC" | awk '{print $1}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::libam-go.so SHA256 mismatch: $ACTUAL ≠ $EXPECTED — НЕ возвращайте maven com.zaneschepke (крашит на raw INI с I1 blob)"
            exit 1
          fi
          echo "libam-go.so SHA256 OK: $ACTUAL"

      - name: Assert APK содержит AmneziaWG so (arm64-v8a)
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          for SO in libam.so libam-go.so libam-quick.so; do
            if ! unzip -l "$APK" | grep -q "lib/arm64-v8a/$SO"; then
              echo "::error::В APK отсутствует lib/arm64-v8a/$SO"
              unzip -l "$APK" | grep -E "lib/arm64-v8a/" || true
              exit 1
            fi
          done
          GO_SIZE=$(unzip -l "$APK" "lib/arm64-v8a/libam-go.so" | awk 'NR==4{print $1}')
          if [ "$GO_SIZE" -lt 8000000 ]; then
            echo "::error::libam-go.so подозрительно мал ($GO_SIZE байт), ожидается ≥8MB"
            exit 1
          fi
          echo "APK содержит AmneziaWG SO (arm64-v8a)"

      - name: Assert dex содержит hev/TProxyService и native bridge классы
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          WORK="$RUNNER_TEMP/apk-extract"
          rm -rf "$WORK" && mkdir -p "$WORK"
          unzip -q "$APK" "classes*.dex" -d "$WORK"
          REQUIRED_CLASSES=(
            "Lhev/TProxyService;"
            "Lru/ozero/enginebyedpi/ByeDpiProxy;"
            "Lru/ozero/commonvpn/OzeroVpnService;"
            "Lru/ozero/commonvpn/HevTunnelGateway;"
            "Lru/ozero/commonvpn/split/TunBuilderConfigurator;"
            "Lru/ozero/enginescore/PersistentLoggers;"
            "Lru/ozero/enginescore/PersistentLogger;"
            "Lru/ozero/app/logging/BootFileLogger;"
            "Lru/ozero/app/logging/UnifiedLogger;"
            "Lru/ozero/app/logging/BootDiagnostics;"
            "Lru/ozero/app/OzeroApp;"
            "Lru/ozero/app/Hilt_OzeroApp;"
            "Lru/ozero/app/MainActivity;"
            "Lru/ozero/app/OzeroQuickTile;"
            "Lru/ozero/app/BootReceiver;"
            "Lru/ozero/app/selfupdate/UpdateInstallResultReceiver;"
            "Lru/ozero/app/warp/WarpEngineService;"
            "Lru/ozero/singboxprocess/SingboxEngineService;"
            "Lru/ozero/app/ui/strategy/StrategyScanService;"
          )
          for cls in "${REQUIRED_CLASSES[@]}"; do
            if ! grep -aor "$cls" "$WORK"/classes*.dex | head -n1 | grep -q "$cls"; then
              echo "::error::В classes.dex отсутствует $cls — R8 удалил/переупаковал, native abort гарантирован"
              exit 1
            fi
          done
          FORBIDDEN_CLASSES=(
            "Lru/ozero/enginexray/"
            "Lru/ozero/enginetor/"
            "Lru/ozero/engineamnezia/"
            "Lru/ozero/enginehysteria2/"
            "Lru/ozero/enginenaive/"
            "StubLib"
            "StubEngine"
            "StubPlugin"
            "StubByeDpi"
            "StubUrnetworkSdkBridge"
          )
          for cls in "${FORBIDDEN_CLASSES[@]}"; do
            if grep -aor "$cls" "$WORK"/classes*.dex | head -n1 | grep -q "$cls"; then
              echo "::error::В classes.dex обнаружен $cls — stub классы запрещены в релизе"
              exit 1
            fi
          done
          echo "Native bridge классы сохранены R8, stub-классы отсутствуют"

      - name: Collect artifacts
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p release-out
          shopt -s nullglob
          mapfile -t apks < <(find app/build/outputs/apk/release -name '*.apk' | sort)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "::error::No release APK produced"
            exit 1
          fi
          if [ ${#apks[@]} -gt 1 ]; then
            echo "::error::ожидался ровно один APK (arm64-v8a-only), найдено ${#apks[@]}"
            printf '  %s\n' "${apks[@]}"
            exit 1
          fi
          cp "${apks[0]}" "release-out/Ozero-${TAG}.apk"
          cd release-out
          for apk in *.apk; do
            sha256sum "$apk" > "${apk}.sha256"
          done

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::RELEASE_GPG_PRIVATE_KEY not set — skipping GPG signature"
            echo "GPG_AVAILABLE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --yes --import
          echo "GPG_AVAILABLE=true" >> "$GITHUB_ENV"

      - name: GPG-sign APKs
        if: env.GPG_AVAILABLE == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          cd release-out
          for apk in *.apk; do
            printf '%s\n' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
                --passphrase-fd 0 \
                --detach-sign --armor \
                --output "${apk}.asc" \
                "$apk"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          prerelease: ${{ contains(steps.ver.outputs.tag, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            release-out/*.apk
            release-out/*.sha256
            release-out/*.asc

  windows:
    name: Build Ozero.exe
    runs-on: windows-latest
    timeout-minutes: 30
    needs: release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            LAST=$(git tag -l 'v*.*.*' | sort -V | tail -1)
            if [ -z "$LAST" ]; then LAST="v0.0.0"; fi
            IFS='.' read -r ma mi pa <<< "${LAST#v}"
            echo "tag=v${ma}.${mi}.$((pa + 1))" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Download desktop engine binaries
        shell: bash
        run: |
          set -euo pipefail
          BINDIR="app-desktop/src/main/resources/binaries"
          mkdir -p "$BINDIR"

          echo "=== sing-box ==="
          gh release download v1.13.12 -R SagerNet/sing-box \
            -p "sing-box-1.13.12-windows-amd64.zip" -D /tmp
          unzip -o /tmp/sing-box-1.13.12-windows-amd64.zip -d /tmp/singbox
          cp /tmp/singbox/sing-box-1.13.12-windows-amd64/sing-box.exe "$BINDIR/"

          echo "=== byedpi ==="
          gh release download v0.17.3 -R hufrea/byedpi \
            -p "byedpi-17.3-x86_64-w64.zip" -D /tmp
          unzip -o /tmp/byedpi-17.3-x86_64-w64.zip -d /tmp/byedpi
          cp /tmp/byedpi/byedpi.exe "$BINDIR/" 2>/dev/null \
            || cp /tmp/byedpi/ciadpi.exe "$BINDIR/byedpi.exe" 2>/dev/null \
            || find /tmp/byedpi -name '*.exe' -exec cp {} "$BINDIR/byedpi.exe" \;

          echo "=== wintun ==="
          curl -fsSL "https://www.wintun.net/builds/wintun-0.14.1.zip" -o /tmp/wintun.zip
          unzip -o /tmp/wintun.zip -d /tmp/wintun
          cp /tmp/wintun/wintun/bin/amd64/wintun.dll "$BINDIR/"

          ls -la "$BINDIR/"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Ozero.exe installer
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: ./gradlew :app-desktop:packageExe -PdesktopVersion=$env:TAG --no-daemon --stacktrace

      - name: Collect Windows artifact
        shell: bash
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          EXE=$(find app-desktop/build/compose/binaries/main/exe -name '*.exe' | head -n1)
          if [ -z "$EXE" ]; then
            echo "::error::Ozero.exe not found after packageExe"
            find app-desktop/build/compose/binaries/ -type f 2>/dev/null || true
            exit 1
          fi
          cp "$EXE" "Ozero-${TAG}.exe"
          sha256sum "Ozero-${TAG}.exe" > "Ozero-${TAG}.exe.sha256"

      - name: Upload Ozero.exe to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          fail_on_unmatched_files: true
          overwrite_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            Ozero-*.exe
            Ozero-*.exe.sha256

  linux:
    name: Build Ozero.deb
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            LAST=$(git tag -l 'v*.*.*' | sort -V | tail -1)
            if [ -z "$LAST" ]; then LAST="v0.0.0"; fi
            IFS='.' read -r ma mi pa <<< "${LAST#v}"
            echo "tag=v${ma}.${mi}.$((pa + 1))" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install fakeroot
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Download desktop engine binaries
        run: |
          set -euo pipefail
          BINDIR="app-desktop/src/main/resources/binaries"
          mkdir -p "$BINDIR"

          echo "=== sing-box ==="
          gh release download v1.13.12 -R SagerNet/sing-box \
            -p "sing-box-1.13.12-linux-amd64.tar.gz" -D /tmp
          tar xzf /tmp/sing-box-1.13.12-linux-amd64.tar.gz -C /tmp
          cp /tmp/sing-box-1.13.12-linux-amd64/sing-box "$BINDIR/"
          chmod +x "$BINDIR/sing-box"

          echo "=== byedpi ==="
          gh release download v0.17.3 -R hufrea/byedpi \
            -p "byedpi-17.3-x86_64-linux.tar.gz" -D /tmp
          tar xzf /tmp/byedpi-17.3-x86_64-linux.tar.gz -C /tmp/byedpi-linux || true
          find /tmp -name 'ciadpi' -exec cp {} "$BINDIR/" \; 2>/dev/null || true
          chmod +x "$BINDIR/ciadpi" 2>/dev/null || true

          ls -la "$BINDIR/"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Ozero.deb
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: ./gradlew :app-desktop:packageDeb -PdesktopVersion=$TAG --no-daemon --stacktrace

      - name: Collect Linux artifact
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          DEB=$(find app-desktop/build/compose/binaries/main/deb -name '*.deb' | head -n1)
          if [ -z "$DEB" ]; then
            echo "::error::Ozero.deb not found after packageDeb"
            find app-desktop/build/compose/binaries/ -type f 2>/dev/null || true
            exit 1
          fi
          cp "$DEB" "Ozero-${TAG}.deb"
          sha256sum "Ozero-${TAG}.deb" > "Ozero-${TAG}.deb.sha256"

      - name: Upload Ozero.deb to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          fail_on_unmatched_files: true
          overwrite_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            Ozero-*.deb
            Ozero-*.deb.sha256

