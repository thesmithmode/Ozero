name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-open-pr-for-same-sha:
    name: Detect open PR with same SHA
    runs-on: ubuntu-latest
    outputs:
      skip_push: ${{ steps.detect-open-pr.outputs.skip_push }}
      run_ci: ${{ steps.detect-open-pr.outputs.run_ci }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check open PR to main for current SHA
        id: detect-open-pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = context.sha;
            const pulls = await github.paginate(
              github.rest.repos.listPullRequestsAssociatedWithCommit,
              {
                owner,
                repo,
                commit_sha: commitSha
              }
            );
            const hasOpenPrToMain = pulls.some(
              (pr) =>
                pr.state === 'open' &&
                pr.base?.ref === 'main' &&
                pr.head?.sha === commitSha
            );
            const skipPush =
              context.eventName === 'push' && hasOpenPrToMain;
            const isPullRequestToMain =
              context.eventName === 'pull_request' &&
              context.payload.pull_request?.base?.ref === 'main';
            const isNonMainNonPullRequest =
              context.eventName !== 'pull_request' &&
              context.ref !== 'refs/heads/main';
            const runCi =
              isPullRequestToMain || (isNonMainNonPullRequest && !skipPush);
            core.setOutput('skip_push', skipPush ? 'true' : 'false');
            core.setOutput('run_ci', runCi ? 'true' : 'false');

  kotlin-style:
    name: ktlint + detekt
    runs-on: ubuntu-latest
    needs: detect-open-pr-for-same-sha
    timeout-minutes: 10
    if: ${{ needs.detect-open-pr-for-same-sha.outputs.run_ci == 'true' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/feature' && !startsWith(github.ref, 'refs/heads/feat/') && !startsWith(github.ref, 'refs/heads/fix/') }}

      - name: ktlint + detekt
        run: ./gradlew ktlintCheck detekt --stacktrace --continue

  extra-checks:
    name: Python + shell + Dockerfile
    runs-on: ubuntu-latest
    needs: detect-open-pr-for-same-sha
    timeout-minutes: 10
    if: ${{ needs.detect-open-pr-for-same-sha.outputs.run_ci == 'true' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python for build-tools tests
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build-tools test dependencies
        run: pip install --quiet pyyaml

      - name: Run build-tools Python tests (regen_lock)
        run: python3 -m unittest discover -s build-tools/tests -p 'test_*.py' -v

      - name: shellcheck + bash syntax (build_*.sh)
        run: |
          bash -n build-tools/build_hysteria2.sh
          bash -n build-tools/build_amneziawg.sh
          bash -n build-tools/build_naive.sh
          bash -n build-tools/build_tor.sh
          bash -n tools/build-urnetwork-aar.sh
          bash -n scripts/build_wireguard_android.sh
          shellcheck -S warning build-tools/build_hysteria2.sh
          shellcheck -S warning build-tools/build_amneziawg.sh
          shellcheck -S warning build-tools/build_naive.sh
          shellcheck -S warning build-tools/build_tor.sh
          shellcheck -S warning tools/build-urnetwork-aar.sh
          shellcheck -S warning scripts/build_wireguard_android.sh

      - name: Validate Dockerfile syntax (hadolint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: build-tools/Dockerfile
          failure-threshold: error

  coverage-gate:
    name: Coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - detect-open-pr-for-same-sha
      - kotlin-style
    if: ${{ always() && !cancelled() && needs.detect-open-pr-for-same-sha.outputs.run_ci == 'true' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/feature' && !startsWith(github.ref, 'refs/heads/feat/') && !startsWith(github.ref, 'refs/heads/fix/') }}

      - name: Get URnetwork AAR tag
        id: aar-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=$(gh release list --limit 100 --json tagName \
            | grep -oE '"urnetwork-sdk-[a-f0-9]{8}"' \
            | head -n1 | tr -d '"')
          if [ -z "$TAG" ]; then
            echo "::error::no urnetwork-sdk release found"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cache URnetwork AAR
        uses: actions/cache@v5
        id: aar-cache
        with:
          path: engine-urnetwork/libs
          key: urnetwork-aar-${{ steps.aar-tag.outputs.tag }}-go-stripped-v1

      - name: Download URnetwork AAR
        if: steps.aar-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p engine-urnetwork/libs
          gh release download "${{ steps.aar-tag.outputs.tag }}" -p "*" -D engine-urnetwork/libs --clobber
          for aar in engine-urnetwork/libs/*.aar; do
            [ -f "$aar" ] || continue
            tmpdir=$(mktemp -d)
            unzip -o "$aar" -d "$tmpdir/aar-exploded"
            zip -d "$tmpdir/aar-exploded/classes.jar" 'go/*.class' 2>/dev/null || true
            (cd "$tmpdir/aar-exploded" && zip -r9 "$GITHUB_WORKSPACE/$aar" .)
            rm -rf "$tmpdir"
          done

      - name: Cache Singbox libs
        uses: actions/cache@v5
        id: singbox-aar-cache
        with:
          path: |
            singbox-core/libs
            singbox-core/libs-stubs
            singbox-core/src/main/jniLibs
          key: singbox-libbox-1.13.12-exploded-v6

      - name: Download and explode Singbox AAR
        if: steps.singbox-aar-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TMPAAR=/tmp/libbox.aar
          gh release download singbox-1.13.12 -p "libbox.aar" -D /tmp --clobber
          mkdir -p singbox-core/libs
          unzip -o "$TMPAAR" classes.jar -d /tmp
          cp /tmp/classes.jar singbox-core/libs/libbox.jar
          mkdir -p singbox-core/libs-stubs /tmp/go-stubs
          unzip -o /tmp/classes.jar 'go/*.class' -d /tmp/go-stubs 2>/dev/null || true
          jar cf singbox-core/libs-stubs/go-stubs.jar -C /tmp/go-stubs . 2>/dev/null || true
          python3 scripts/patch-go-seq.py singbox-core/libs-stubs/go-stubs.jar
          zip -d singbox-core/libs/libbox.jar 'go/*.class' || true
          mkdir -p singbox-core/src/main/jniLibs
          unzip -o "$TMPAAR" 'jni/*' -d /tmp/aar-exploded || true
          if [ -d /tmp/aar-exploded/jni ]; then
            cp -r /tmp/aar-exploded/jni/* singbox-core/src/main/jniLibs/
          fi

      - name: coverage verification first
        run: >
          ./gradlew
          :app:testDebugUnitTest :app:jacocoTestReport :app:jacocoTestCoverageVerification
          :common-vpn:testDebugUnitTest :common-vpn:jacocoTestReport :common-vpn:jacocoTestCoverageVerification
          :engine-urnetwork:testDebugUnitTest :engine-urnetwork:jacocoTestReport :engine-urnetwork:jacocoTestCoverageVerification
          --stacktrace --continue

      - name: Verify tests were discovered
        run: |
          python3 -m pip install --quiet defusedxml
          python3 scripts/verify-junit-nonzero.py app common-vpn engine-urnetwork

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-coverage-gate
          path: |
            app/build/reports/jacoco/**
            common-vpn/build/reports/jacoco/**
            engine-urnetwork/build/reports/jacoco/**
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports-coverage-gate
          path: |
            app/build/reports/tests/**
            common-vpn/build/reports/tests/**
            engine-urnetwork/build/reports/tests/**
          retention-days: 14

  test-buildsrc:
    name: Tests — buildSrc (supply-chain SHA256)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - detect-open-pr-for-same-sha
      - kotlin-style
    if: ${{ always() && !cancelled() && needs.detect-open-pr-for-same-sha.outputs.run_ci == 'true' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/feature' && !startsWith(github.ref, 'refs/heads/feat/') && !startsWith(github.ref, 'refs/heads/fix/') }}

      - name: buildSrc unit tests + coverage
        run: ./gradlew :buildSrc:test :buildSrc:jacocoTestReport :buildSrc:jacocoTestCoverageVerification --stacktrace --continue

      - name: Verify tests were discovered
        run: |
          python3 -m pip install --quiet defusedxml
          python3 scripts/verify-junit-nonzero.py buildSrc

      - name: Upload buildSrc test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports-buildsrc
          path: buildSrc/build/reports/tests/**
          retention-days: 14

      - name: Upload buildSrc coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-buildsrc
          path: buildSrc/build/reports/jacoco/**
          retention-days: 14

  assemble-debug:
    name: assembleDebug
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - detect-open-pr-for-same-sha
      - kotlin-style
    if: ${{ always() && !cancelled() && needs.detect-open-pr-for-same-sha.outputs.run_ci == 'true' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/feature' && !startsWith(github.ref, 'refs/heads/feat/') && !startsWith(github.ref, 'refs/heads/fix/') }}

      - name: Download native binaries
        run: ./gradlew :engine-byedpi:downloadBinaries --stacktrace

      - name: Get URnetwork AAR tag
        id: aar-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=$(gh release list --limit 100 --json tagName \
            | grep -oE '"urnetwork-sdk-[a-f0-9]{8}"' \
            | head -n1 | tr -d '"')
          if [ -z "$TAG" ]; then
            echo "::error::no urnetwork-sdk release found"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cache URnetwork AAR
        uses: actions/cache@v5
        id: aar-cache
        with:
          path: engine-urnetwork/libs
          key: urnetwork-aar-${{ steps.aar-tag.outputs.tag }}-go-stripped-v1

      - name: Download URnetwork AAR (urnetwork-sdk only — Portal Tor parity)
        if: steps.aar-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p engine-urnetwork/libs
          gh release download "${{ steps.aar-tag.outputs.tag }}" -p "*" -D engine-urnetwork/libs --clobber
          for aar in engine-urnetwork/libs/*.aar; do
            [ -f "$aar" ] || continue
            tmpdir=$(mktemp -d)
            unzip -o "$aar" -d "$tmpdir/aar-exploded"
            zip -d "$tmpdir/aar-exploded/classes.jar" 'go/*.class' 2>/dev/null || true
            (cd "$tmpdir/aar-exploded" && zip -r9 "$GITHUB_WORKSPACE/$aar" .)
            rm -rf "$tmpdir"
          done
          ls -la engine-urnetwork/libs/

      - name: Cache Singbox libs
        uses: actions/cache@v5
        id: singbox-aar-cache
        with:
          path: |
            singbox-core/libs
            singbox-core/libs-stubs
            singbox-core/src/main/jniLibs
          key: singbox-libbox-1.13.12-exploded-v6

      - name: Download and explode Singbox AAR
        if: steps.singbox-aar-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TMPAAR=/tmp/libbox.aar
          gh release download singbox-1.13.12 -p "libbox.aar" -D /tmp --clobber
          mkdir -p singbox-core/libs
          unzip -o "$TMPAAR" classes.jar -d /tmp
          cp /tmp/classes.jar singbox-core/libs/libbox.jar
          mkdir -p singbox-core/libs-stubs /tmp/go-stubs
          unzip -o /tmp/classes.jar 'go/*.class' -d /tmp/go-stubs 2>/dev/null || true
          jar cf singbox-core/libs-stubs/go-stubs.jar -C /tmp/go-stubs . 2>/dev/null || true
          python3 scripts/patch-go-seq.py singbox-core/libs-stubs/go-stubs.jar
          zip -d singbox-core/libs/libbox.jar 'go/*.class' || true
          mkdir -p singbox-core/src/main/jniLibs
          unzip -o "$TMPAAR" 'jni/*' -d /tmp/aar-exploded || true
          if [ -d /tmp/aar-exploded/jni ]; then
            cp -r /tmp/aar-exploded/jni/* singbox-core/src/main/jniLibs/
          fi
          ls -la singbox-core/libs/
          find singbox-core/src/main/jniLibs -type f 2>/dev/null || echo "no jniLibs"

      - name: assembleDebug
        run: ./gradlew assembleDebug --stacktrace

      - name: Assert APK contains MasterDNS subprocess binary
        run: |
          set -euo pipefail
          APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::Debug APK was not produced"
            exit 1
          fi
          if ! unzip -l "$APK" | grep -q "lib/arm64-v8a/libmdnsvpn.so"; then
            echo "::error::APK is missing lib/arm64-v8a/libmdnsvpn.so"
            unzip -l "$APK" | grep -E "lib/arm64-v8a/" || true
            exit 1
          fi
          SIZE=$(unzip -l "$APK" "lib/arm64-v8a/libmdnsvpn.so" | awk 'NR==4{print $1}')
          if [ "$SIZE" -lt 1000000 ]; then
            echo "::error::libmdnsvpn.so is suspiciously small ($SIZE bytes)"
            exit 1
          fi
          echo "APK contains MasterDNS subprocess binary"

      - name: lintVitalAnalyzeRelease (smoke — release-path lint without keystore)
        run: ./gradlew :app:lintVitalAnalyzeRelease --stacktrace

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  test-app:
    name: Tests — app
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - detect-open-pr-for-same-sha
