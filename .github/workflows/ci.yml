name: CI

on:
  push:
    branches:
      - main
      - dev
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' }}

      - name: Download native binaries (RT.1.7)
        run: ./gradlew :engine-byedpi:downloadBinaries --stacktrace

      - name: Run ktlint, detekt, lint, build, and tests
        run: ./gradlew ktlintCheck detekt lint assembleDebug testDebugUnitTest jacocoTestReport jacocoTestCoverageVerification --stacktrace --continue

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Jacoco coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: '**/build/reports/jacoco/**'
          retention-days: 30

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: '**/build/reports/lint-results-*.html'
          retention-days: 30

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          retention-days: 30

  abi-matrix-build:
    name: Build (${{ matrix.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' }}

      - name: Build for ${{ matrix.abi }}
        run: ./gradlew assembleDebug -PabiFilter=${{ matrix.abi }} --stacktrace --continue

  xray-builder-image:
    name: Xray Builder Scripts (verify)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: shellcheck + bash syntax (build_*.sh)
        run: |
          bash -n build-tools/build_xray.sh
          bash -n build-tools/build_hysteria2.sh
          bash -n build-tools/build_amneziawg.sh
          bash -n build-tools/build_naive.sh
          bash -n build-tools/build_tor.sh
          sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck -S warning build-tools/build_xray.sh
          shellcheck -S warning build-tools/build_hysteria2.sh
          shellcheck -S warning build-tools/build_amneziawg.sh
          shellcheck -S warning build-tools/build_naive.sh
          shellcheck -S warning build-tools/build_tor.sh

      - name: Validate Dockerfile syntax (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: build-tools/Dockerfile
          failure-threshold: error

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'java'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Build for CodeQL analysis
        run: ./gradlew assembleDebug --no-daemon

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
