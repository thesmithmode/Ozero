name: CI

on:
  push:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kotlin-style:
    name: ktlint + detekt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.ref != 'refs/heads/main' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/feature' && !startsWith(github.ref, 'refs/heads/feat/') && !startsWith(github.ref, 'refs/heads/fix/') }}

      - name: ktlint + detekt
        run: ./gradlew ktlintCheck detekt --stacktrace --continue

  extra-checks:
    name: Python + shell + Dockerfile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.ref != 'refs/heads/main' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python for build-tools tests
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build-tools test dependencies
        run: pip install --quiet pyyaml

      - name: Run build-tools Python tests (regen_lock)
        run: python3 -m unittest discover -s build-tools/tests -p 'test_*.py' -v

      - name: shellcheck + bash syntax (build_*.sh)
        run: |
          bash -n build-tools/build_hysteria2.sh
          bash -n build-tools/build_amneziawg.sh
          bash -n build-tools/build_naive.sh
          bash -n build-tools/build_tor.sh
          bash -n tools/build-urnetwork-aar.sh
          bash -n scripts/build_wireguard_android.sh
          shellcheck -S warning build-tools/build_hysteria2.sh
          shellcheck -S warning build-tools/build_amneziawg.sh
          shellcheck -S warning build-tools/build_naive.sh
          shellcheck -S warning build-tools/build_tor.sh
          shellcheck -S warning tools/build-urnetwork-aar.sh
          shellcheck -S warning scripts/build_wireguard_android.sh

      - name: Validate Dockerfile syntax (hadolint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: build-tools/Dockerfile
          failure-threshold: error

  test-buildsrc:
    name: Tests — buildSrc (supply-chain SHA256)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: kotlin-style
    if: ${{ github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/feature' || startsWith(github.ref, 'refs/heads/feat/') || startsWith(github.ref, 'refs/heads/fix/') }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/feature' && !startsWith(github.ref, 'refs/heads/feat/') && !startsWith(github.ref, 'refs/heads/fix/') }}

      - name: buildSrc unit tests
        run: ./gradlew :buildSrc:test --stacktrace --continue

      - name: Upload buildSrc test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-buildsrc
          path: buildSrc/build/reports/tests/**
          retention-days: 14

  assemble-debug:
    name: assembleDebug
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: kotlin-style
    if: ${{ github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/feature' || startsWith(github.ref, 'refs/heads/feat/') || startsWith(github.ref, 'refs/heads/fix/') }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/feature' && !startsWith(github.ref, 'refs/heads/feat/') && !startsWith(github.ref, 'refs/heads/fix/') }}

      - name: Download native binaries
        run: ./gradlew :engine-byedpi:downloadBinaries --stacktrace

      - name: Get URnetwork AAR tag
        id: aar-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=$(gh release list --limit 100 --json tagName \
            | grep -oE '"urnetwork-sdk-[a-f0-9]{8}"' \
            | head -n1 | tr -d '"')
          if [ -z "$TAG" ]; then
            echo "::error::no urnetwork-sdk release found"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cache URnetwork AAR
        uses: actions/cache@v5
        id: aar-cache
        with:
          path: engine-urnetwork/libs
          key: urnetwork-aar-${{ steps.aar-tag.outputs.tag }}

      - name: Download URnetwork AAR (urnetwork-sdk only — Portal Tor parity)
        if: steps.aar-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p engine-urnetwork/libs
          gh release download "${{ steps.aar-tag.outputs.tag }}" -p "*" -D engine-urnetwork/libs --clobber
          ls -la engine-urnetwork/libs/

      - name: Cache Singbox AAR
        uses: actions/cache@v5
        id: singbox-aar-cache
        with:
          path: singbox-core/libs
          key: singbox-libbox-1.13.12-relocated

      - name: Download Singbox AAR
        if: steps.singbox-aar-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p singbox-core/libs
          gh release download singbox-1.13.12 -p "libbox.aar" -D singbox-core/libs --clobber
          wget -q https://repo1.maven.org/maven2/org/pantsbuild/jarjar/1.7.2/jarjar-1.7.2.jar -O /tmp/jarjar.jar
          wget -q https://repo1.maven.org/maven2/org/ow2/asm/asm/9.7.1/asm-9.7.1.jar -O /tmp/asm.jar
          wget -q https://repo1.maven.org/maven2/org/ow2/asm/asm-commons/9.7.1/asm-commons-9.7.1.jar -O /tmp/asm-commons.jar
          wget -q https://repo1.maven.org/maven2/org/ow2/asm/asm-tree/9.7.1/asm-tree-9.7.1.jar -O /tmp/asm-tree.jar
          echo 'rule go.** go_singbox.@1' > /tmp/jarjar-rules.txt
          cd singbox-core/libs
          unzip -o libbox.aar classes.jar
          java -cp /tmp/jarjar.jar:/tmp/asm.jar:/tmp/asm-commons.jar:/tmp/asm-tree.jar org.pantsbuild.jarjar.Main process /tmp/jarjar-rules.txt classes.jar classes-relocated.jar
          mv classes-relocated.jar classes.jar
          zip libbox.aar classes.jar
          rm classes.jar
          cd ../..
          ls -la singbox-core/libs/

      - name: assembleDebug
        run: ./gradlew assembleDebug --stacktrace

      - name: lintVitalAnalyzeRelease (smoke — release-path lint without keystore)
        run: ./gradlew :app:lintVitalAnalyzeRelease --stacktrace

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

