          key: singbox-libbox-1.13.12-relocated

      - name: Download Singbox AAR
        if: steps.singbox-aar-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p singbox-core/libs
          gh release download singbox-1.13.12 -p "libbox.aar" -D singbox-core/libs --clobber
          wget -q https://repo1.maven.org/maven2/org/pantsbuild/jarjar/1.7.2/jarjar-1.7.2.jar -O /tmp/jarjar.jar
          wget -q https://repo1.maven.org/maven2/org/ow2/asm/asm/9.7.1/asm-9.7.1.jar -O /tmp/asm.jar
          wget -q https://repo1.maven.org/maven2/org/ow2/asm/asm-commons/9.7.1/asm-commons-9.7.1.jar -O /tmp/asm-commons.jar
          wget -q https://repo1.maven.org/maven2/org/ow2/asm/asm-tree/9.7.1/asm-tree-9.7.1.jar -O /tmp/asm-tree.jar
          echo 'rule go.** go_singbox.@1' > /tmp/jarjar-rules.txt
          cd singbox-core/libs
          unzip -o libbox.aar classes.jar
          java -cp /tmp/jarjar.jar:/tmp/asm.jar:/tmp/asm-commons.jar:/tmp/asm-tree.jar org.pantsbuild.jarjar.Main process /tmp/jarjar-rules.txt classes.jar classes-relocated.jar
          mv classes-relocated.jar classes.jar
          zip libbox.aar classes.jar
          rm classes.jar
          cd ../..
          ls -la singbox-core/libs/

      - name: testDebugUnitTest + coverage
        run: ./gradlew :app:testDebugUnitTest :app:jacocoTestReport :app:jacocoTestCoverageVerification --stacktrace --continue

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-app
          path: app/build/reports/jacoco/**
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-app
          path: app/build/reports/tests/**
          retention-days: 14

