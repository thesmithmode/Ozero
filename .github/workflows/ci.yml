    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: kotlin-style
    if: ${{ github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/feature' || startsWith(github.ref, 'refs/heads/feat/') || startsWith(github.ref, 'refs/heads/fix/') }}
