          :engine-fptn:testDebugUnitTest :engine-fptn:jacocoTestReport :engine-fptn:jacocoTestCoverageVerification
          --stacktrace --continue

      - name: Verify tests were discovered
        run: python3 scripts/verify-junit-nonzero.py engine-urnetwork engine-byedpi engine-fptn

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-engines-urnetwork-byedpi
          path: |
            engine-urnetwork/build/reports/jacoco/**
            engine-byedpi/build/reports/jacoco/**
