          fi
          ls -la singbox-core/libs/
          find singbox-core/src/main/jniLibs -type f 2>/dev/null || echo "no jniLibs"

      - name: testDebugUnitTest + coverage
        run: ./gradlew :app:testDebugUnitTest :app:jacocoTestReport :app:jacocoTestCoverageVerification --stacktrace --continue

      - name: Verify tests were discovered
        run: |
          python3 -m pip install --quiet defusedxml
          python3 scripts/verify-junit-nonzero.py app

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-app
          path: app/build/reports/jacoco/**
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports-app
          path: app/build/reports/tests/**
          retention-days: 14

  test-common-vpn:
    name: Tests — common-vpn
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
