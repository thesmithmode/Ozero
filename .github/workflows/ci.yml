      - name: Get URnetwork AAR tag
        id: aar-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=$(gh release list --limit 100 --json tagName \
