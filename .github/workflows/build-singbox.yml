name: Build Singbox AAR

on:
  workflow_dispatch:
    inputs:
      libbox_version:
        description: 'libbox version from singbox-android/libbox releases'
        required: true
        default: '1.13.12'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ozero
        uses: actions/checkout@v7

      - name: Download libbox AAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.libbox_version }}"
          mkdir -p singbox-core/libs
          gh release download "singbox-$VERSION" -p "libbox.aar" -D singbox-core/libs --clobber
          ls -la singbox-core/libs/
          sha256sum singbox-core/libs/libbox.aar

      - name: Verify AAR contents
        run: |
          set -euo pipefail
          AAR="singbox-core/libs/libbox.aar"
          echo "=== AAR size ==="
          stat --printf="%s bytes\n" "$AAR"
          echo "=== Key entries ==="
          unzip -l "$AAR" | grep -E '\.so$|classes\.jar|AndroidManifest'
