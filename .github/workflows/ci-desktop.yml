name: Desktop CI

on:
  push:
    branches: [ dev, win11 ]
    paths:
      - 'app-desktop/**'
      - 'buildSrc/**'
      - 'gradle/**'
  pull_request:
    branches: [ dev ]
    paths:
      - 'app-desktop/**'

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Compile Desktop module
        run: ./gradlew :app-desktop:compileKotlin --no-daemon
      - name: Run Desktop tests
        run: ./gradlew :app-desktop:test --no-daemon
      - name: Package Windows MSI
        run: ./gradlew :app-desktop:packageMsi --no-daemon
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ozero-desktop-msi
          path: app-desktop/build/compose/binaries/main/msi/*.msi
          if-no-files-found: warn
